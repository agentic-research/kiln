name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.1.7)'
        required: true
        type: string

permissions:
  contents: write
  packages: write
  id-token: write   # cosign keyless + SLSA provenance
  actions: read      # SLSA provenance detection

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/mache
  # workflow_dispatch passes the tag as input; tag push has it as ref_name
  TAG: ${{ inputs.tag || github.ref_name }}

jobs:
  # Download pre-built artifacts from upstream releases (no build matrix needed)
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Download ley-line release artifacts
        env:
          GH_TOKEN: ${{ secrets.LEYLINE_PAT }}
        run: |
          mkdir -p dist
          gh release download --repo agentic-research/ley-line -p '*' -D dist/
          echo "=== ley-line artifacts ==="
          ls -lh dist/

      - name: Download mache release artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download --repo agentic-research/mache -p '*' --clobber -D dist/
          echo "=== all artifacts ==="
          ls -lh dist/

      - name: Upload leyline-darwin-arm64
        uses: actions/upload-artifact@v6
        with:
          name: leyline-darwin-arm64
          path: dist/leyline-darwin-arm64

      - name: Upload leyline-linux-amd64
        uses: actions/upload-artifact@v6
        with:
          name: leyline-linux-amd64
          path: dist/leyline-linux-amd64

      - name: Upload leyline-linux-arm64
        uses: actions/upload-artifact@v6
        with:
          name: leyline-linux-arm64
          path: dist/leyline-linux-arm64

      - name: Upload mache-darwin-arm64
        uses: actions/upload-artifact@v6
        with:
          name: mache-darwin-arm64
          path: dist/mache-darwin-arm64

      - name: Upload mache-linux-amd64
        uses: actions/upload-artifact@v6
        with:
          name: mache-linux-amd64
          path: dist/mache-linux-amd64

      - name: Upload mache-linux-arm64
        uses: actions/upload-artifact@v6
        with:
          name: mache-linux-arm64
          path: dist/mache-linux-arm64

  # OCI image (linux/amd64 + linux/arm64)
  container:
    needs: download
    runs-on: ubuntu-latest
    steps:
      - name: Checkout kiln
        uses: actions/checkout@v6

      - name: Download linux amd64 mache binary
        uses: actions/download-artifact@v7
        with:
          name: mache-linux-amd64
          path: image/linux-amd64/

      - name: Download linux amd64 leyline binary
        uses: actions/download-artifact@v7
        with:
          name: leyline-linux-amd64
          path: image/linux-amd64/

      - name: Download linux arm64 mache binary
        uses: actions/download-artifact@v7
        with:
          name: mache-linux-arm64
          path: image/linux-arm64/

      - name: Download linux arm64 leyline binary
        uses: actions/download-artifact@v7
        with:
          name: leyline-linux-arm64
          path: image/linux-arm64/

      - name: Prepare binaries
        run: |
          mv image/linux-amd64/mache-linux-amd64 image/linux-amd64/mache
          mv image/linux-amd64/leyline-linux-amd64 image/linux-amd64/leyline
          chmod +x image/linux-amd64/mache image/linux-amd64/leyline
          mv image/linux-arm64/mache-linux-arm64 image/linux-arm64/mache
          mv image/linux-arm64/leyline-linux-arm64 image/linux-arm64/leyline
          chmod +x image/linux-arm64/mache image/linux-arm64/leyline

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.release
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.TAG }}
            ${{ env.IMAGE_NAME }}:latest

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image
        run: cosign sign --yes ${{ env.IMAGE_NAME }}:${{ env.TAG }}

  # GitHub Release with binaries + SBOM
  release:
    needs: download
    runs-on: ubuntu-latest
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          merge-multiple: true
          path: dist/

      - name: Create checksums
        run: |
          cd dist
          sha256sum mache-* leyline-* > checksums.txt
          cat checksums.txt

      - name: Generate subject hashes for SLSA
        id: hash
        run: |
          cd dist
          echo "hashes=$(sha256sum mache-* leyline-* | base64 -w0)" >> "$GITHUB_OUTPUT"

      # --- SBOM ---
      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: dist/kiln.spdx.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          generate_release_notes: true
          files: |
            dist/mache-*
            dist/leyline-*
            dist/checksums.txt
            dist/kiln.spdx.json

      # --- Cosign binary signing ---
      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign release binaries
        run: |
          cd dist
          for f in mache-* leyline-*; do
            [ -f "$f" ] || continue
            cosign sign-blob --yes "$f" \
              --output-signature "${f}.sig" \
              --output-certificate "${f}.cert"
          done

      - name: Upload signatures to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          files: |
            dist/*.sig
            dist/*.cert

  # --- SLSA Provenance (Level 3) ---
  provenance:
    name: SLSA Provenance
    needs: release
    if: always()
    permissions:
      actions: read
      id-token: write
      contents: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: "${{ needs.release.outputs.hashes }}"
      upload-assets: true

  # Update Homebrew tap formula with new checksums
  homebrew:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout homebrew-tap
        uses: actions/checkout@v6
        with:
          repository: agentic-research/homebrew-tap
          token: ${{ secrets.LEYLINE_PAT }}

      - name: Download checksums
        run: |
          curl -sL "https://github.com/agentic-research/kiln/releases/download/${{ env.TAG }}/checksums.txt" -o checksums.txt

      - name: Update formula
        run: |
          VERSION="${{ env.TAG }}"
          VERSION="${VERSION#v}"  # strip leading v

          SHA_DARWIN_ARM64=$(grep mache-darwin-arm64 checksums.txt | awk '{print $1}')
          SHA_LINUX_AMD64=$(grep mache-linux-amd64 checksums.txt | awk '{print $1}')
          SHA_LINUX_ARM64=$(grep mache-linux-arm64 checksums.txt | awk '{print $1}')

          sed -i "s/version \".*\"/version \"${VERSION}\"/" Formula/mache.rb

          # Update sha256 values in order: darwin-arm64, linux-amd64, linux-arm64
          python3 -c "
          import re
          with open('Formula/mache.rb') as f:
              content = f.read()
          shas = ['${SHA_DARWIN_ARM64}', '${SHA_LINUX_AMD64}', '${SHA_LINUX_ARM64}']
          i = 0
          def replace_sha(m):
              global i
              result = f'sha256 \"{shas[i]}\"'
              i += 1
              return result
          content = re.sub(r'sha256 \"[A-Fa-f0-9]+\"', replace_sha, content)
          content = re.sub(r'sha256 \"PLACEHOLDER\"', replace_sha, content)
          with open('Formula/mache.rb', 'w') as f:
              f.write(content)
          "

      - name: Commit and push
        run: |
          git config user.name "kiln-ci"
          git config user.email "kiln-ci@users.noreply.github.com"
          git add Formula/mache.rb
          git commit -m "kiln ${{ env.TAG }}"
          git push
