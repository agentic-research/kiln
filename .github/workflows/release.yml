name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write
  id-token: write  # cosign keyless signing

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/mache

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest       # Apple Silicon
            artifact: mache-darwin-arm64
            leyline-artifact: leyline-darwin-arm64
          - os: ubuntu-latest
            artifact: mache-linux-amd64
            leyline-artifact: leyline-linux-amd64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout kiln
        uses: actions/checkout@v6

      - name: Checkout mache
        uses: actions/checkout@v6
        with:
          repository: agentic-research/mache
          path: mache

      - name: Checkout ley-line
        uses: actions/checkout@v6
        with:
          repository: agentic-research/ley-line
          path: ley-line
          token: ${{ secrets.LEYLINE_PAT }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache-dependency-path: mache/go.sum

      - name: Install Task
        uses: go-task/setup-task@v1

      # Platform deps — the only CI-specific part
      - name: Install fuse-t (macOS)
        if: runner.os == 'macOS'
        run: brew install --cask fuse-t && brew install capnp

      - name: Install libfuse-dev (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libfuse-dev capnproto

      # Build — same command locally and in CI
      # In CI, repos are checked out inside workspace (not siblings)
      - name: Build
        env:
          MACHE_DIR: ${{ github.workspace }}/mache
          LEYLINE_DIR: ${{ github.workspace }}/ley-line
        run: |
          task ci-binary \
            OUTPUT=${{ github.workspace }}/${{ matrix.artifact }} \
            LEYLINE_OUTPUT=${{ github.workspace }}/${{ matrix.leyline-artifact }}

      - name: Upload mache artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

      - name: Upload leyline artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.leyline-artifact }}
          path: ${{ matrix.leyline-artifact }}

  # OCI image (linux/amd64)
  container:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout kiln
        uses: actions/checkout@v6

      - name: Download linux mache binary
        uses: actions/download-artifact@v7
        with:
          name: mache-linux-amd64
          path: image/linux-amd64/

      - name: Download linux leyline binary
        uses: actions/download-artifact@v7
        with:
          name: leyline-linux-amd64
          path: image/linux-amd64/

      - name: Prepare binaries
        run: |
          mv image/linux-amd64/mache-linux-amd64 image/linux-amd64/mache
          mv image/linux-amd64/leyline-linux-amd64 image/linux-amd64/leyline
          chmod +x image/linux-amd64/mache image/linux-amd64/leyline

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.release
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.ref_name }}
            ${{ env.IMAGE_NAME }}:latest

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image
        run: cosign sign --yes ${{ env.IMAGE_NAME }}:${{ github.ref_name }}

  # GitHub Release with binaries
  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          merge-multiple: true
          path: dist/

      - name: Create checksums
        run: |
          cd dist
          sha256sum mache-* leyline-* > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/mache-*
            dist/leyline-*
            dist/checksums.txt

  # Update Homebrew tap formula with new checksums
  homebrew:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout homebrew-tap
        uses: actions/checkout@v6
        with:
          repository: agentic-research/homebrew-tap
          token: ${{ secrets.LEYLINE_PAT }}

      - name: Download checksums
        run: |
          curl -sL "https://github.com/agentic-research/kiln/releases/download/${{ github.ref_name }}/checksums.txt" -o checksums.txt

      - name: Update formula
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"  # strip leading v

          SHA_DARWIN_ARM64=$(grep mache-darwin-arm64 checksums.txt | awk '{print $1}')
          SHA_LINUX_AMD64=$(grep mache-linux-amd64 checksums.txt | awk '{print $1}')

          sed -i "s/version \".*\"/version \"${VERSION}\"/" Formula/mache.rb

          # Update sha256 values in order: darwin-arm64, linux-amd64
          python3 -c "
          import re
          with open('Formula/mache.rb') as f:
              content = f.read()
          shas = ['${SHA_DARWIN_ARM64}', '${SHA_LINUX_AMD64}']
          i = 0
          def replace_sha(m):
              global i
              result = f'sha256 \"{shas[i]}\"'
              i += 1
              return result
          content = re.sub(r'sha256 \"[A-Fa-f0-9]+\"', replace_sha, content)
          content = re.sub(r'sha256 \"PLACEHOLDER\"', replace_sha, content)
          with open('Formula/mache.rb', 'w') as f:
              f.write(content)
          "

      - name: Commit and push
        run: |
          git config user.name "kiln-ci"
          git config user.email "kiln-ci@users.noreply.github.com"
          git add Formula/mache.rb
          git commit -m "kiln ${{ github.ref_name }}"
          git push
