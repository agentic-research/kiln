# melange.yaml -- package pre-built kiln binaries as an APK
#
# melange build melange.yaml --arch x86_64,aarch64 \
#   --source-dir .. --signing-key melange.rsa

package:
  name: kiln
  version: 0.1.0
  epoch: 0
  description: "mache + ley-line in a box -- MCP server for structural code projection"
  copyright:
    - license: Apache-2.0
  dependencies:
    runtime:
      - ca-certificates-bundle
      - libsqlite-3.0

environment:
  contents:
    packages:
      - build-base
      - ca-certificates-bundle

pipeline:
  # Install pre-built binaries (no compilation needed)
  - runs: |
      ARCH=$(uname -m)
      if [ "$ARCH" = "x86_64" ]; then SUFFIX="linux-amd64"; fi
      if [ "$ARCH" = "aarch64" ]; then SUFFIX="linux-arm64"; fi

      install -Dm755 "dist/mache-${SUFFIX}" \
        "${{targets.destdir}}/usr/bin/mache"
      install -Dm755 "dist/leyline-${SUFFIX}" \
        "${{targets.destdir}}/usr/bin/leyline"

      if [ -f "dist/libleyline_fs-${SUFFIX}.a" ]; then
        install -Dm644 "dist/libleyline_fs-${SUFFIX}.a" \
          "${{targets.destdir}}/usr/lib/libleyline_fs.a"
      fi
      if [ -f "dist/leyline_fs.h" ]; then
        install -Dm644 "dist/leyline_fs.h" \
          "${{targets.destdir}}/usr/include/leyline_fs.h"
      fi

test:
  pipeline:
    - runs: |
        mache version
        mache --help
        leyline --help

update:
  enabled: true
  github:
    identifier: agentic-research/kiln
    strip-prefix: v
